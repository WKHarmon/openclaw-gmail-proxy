services:
  authorization-gateway:
    build: .
    container_name: authorization-gateway
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
      - ./sensitive_patterns.json:/app/sensitive_patterns.json:ro
    ports:
      - "127.0.0.1:${PROXY_PORT:-18795}:${PROXY_PORT:-18795}"
    env_file:
      - .env
    depends_on:
      - signal-api
    restart: unless-stopped
    networks:
      - default
      - ads-b_default

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    volumes:
      - ./signal-data:/home/.local/share/signal-cli
    environment:
      - MODE=json-rpc
      # Port must match config.json "port". Append ?token=<secret> to authenticate.
      - RECEIVE_WEBHOOK_URL=http://authorization-gateway:${PROXY_PORT:-18795}/internal/signal-webhook?token=${SIGNAL_WEBHOOK_TOKEN:-}
    restart: unless-stopped

networks:
  ads-b_default:
    external: true
